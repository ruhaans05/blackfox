<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Blackfox{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">black<span>fox</span></a>
    {% if user %}
      <nav>
        <a href="{{ url_for('dashboard') }}">My resumes</a>
        <span class="who">{{ user['email'] }}</span>
        <form method="post" action="{{ url_for('logout') }}" class="inline">
          <button class="link">Sign out</button>
        </form>
      </nav>
    {% endif %}
  </header>

  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{% for m in messages %}<p>{{ m }}</p>{% endfor %}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
